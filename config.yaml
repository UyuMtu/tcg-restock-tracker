# ============================================================
#  TCG Restock Tracker — Configuration File
# ============================================================
#  Edit this file to add/remove products and set your
#  notification preferences.
#
#  ⚠️  DO NOT put your webhook URLs or tokens here.
#      Those go in GitHub Secrets (see README for how).
# ============================================================

settings:
  # Alert me when a price drops by at least this percentage
  price_drop_threshold_percent: 5

  # How often GitHub Actions checks (this is just a label for you — 
  # the actual schedule is set in .github/workflows/tracker.yml)
  check_interval_minutes: 30

